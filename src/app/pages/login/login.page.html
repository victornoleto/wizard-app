<div class="p-4">

	<h1 class="text-primary fw-bolder mb-3">Login</h1>
	
	<app-form *ngIf="fg" [fg]="fg" (onSubmit)="onSubmit()">
		
		<app-form-input-text
			name="username"
			label="Nome de usuário"
			description="Qual é o seu nome de guerra?"
			[maxlength]="12"
		/>
	
		<!-- <app-form-input-password name="password" label="Senha" /> -->
	
		<div class="d-flex justify-content-end">
			<button type="submit" class="btn btn-lg btn-primary fw-bold w-100">Login</button>
		</div>
	
	</app-form>

	</div> -->

</div>

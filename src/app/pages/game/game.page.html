<app-header>
	
	Jogo {{ gameId }}

	<ng-container *ngIf="game && game.current_match && game.current_round">
		<small>Partida {{ game.current_match }}/{{ game.end_match }} — Round {{ game.current_round }}/{{ game.current_match }}</small>
	</ng-container>

	<ng-container end *ngIf="game && !game.started_at && game.created_by == user.id">
		<button type="button" class="btn btn-sm btn-dark ms-auto fw-bold" (click)="start()">Iniciar</button>
	</ng-container>

</app-header>

<app-game-status-bar *ngIf="message" [message]="message" />

<div #slider class="swiper">

	<div class="swiper-wrapper">

		<div class="swiper-slide">
			
			<app-body>

				<!-- <button type="button" class="btn btn-primary" (click)="onRequestCard()">onRequestCard</button>
				<button type="button" class="btn btn-primary" (click)="onRequestBet()">onRequestBet</button> -->

				<ng-container *ngIf="!joined">
					
					<div class="d-flex ion-justify-content-center m-3">
						<button type="button" class="btn btn-lg btn-dark fw-bold" (click)="join()">Entrar</button>
					</div>

				</ng-container>

				<ng-container *ngIf="joined">

					<span *ngIf="joker">O coringa é {{ joker.name }} {{ joker.symbol }}</span>

					<app-players-table [players]="players" />

					<app-game-request-bet *ngIf="requestBet" [n]="cards.length" (onBet)="onBet($event)" />

					<app-game-round-data class="mt-3" *ngIf="lastRoundData" [data]="lastRoundData" message="Último round" />

					<app-game-round-data class="mt-3" *ngIf="currentRoundData" [data]="currentRoundData" message="Round atual" />

					<app-game-my-cards [cards]="cards" (onCardClick)="onCardSelect($event)" />

				</ng-container>

				<!-- <pre *ngIf="game">{{ game | json }}</pre> -->
				<!-- <pre>{{ requestBet | json }}</pre> -->

			</app-body>

		</div>

		<div class="swiper-slide" *ngIf="joined && roundsData.length > 0">

			<app-body>
				
				<div id="rounds-data" class="d-flex flex-column-reverse gap-2">
					<app-game-round-data *ngFor="let data of roundsData" [data]="data" />
				</div>

			</app-body>

		</div>

		<div class="swiper-slide" *ngIf="joined">

			<app-body>
				<app-game-log [logs]="logs" />
			</app-body>

		</div>

	</div>

</div>

<div class="page-message d-flex flex-column align-items-center justify-content-center text-center mt-4 ps-3 pe-3">
		
	<div class="icon d-flex justify-content-center align-items-center mb-3 opacity-50" *ngIf="icon">
		<i [class]="icon"></i>
	</div>

	<h3 class="m-0">{{ title }}</h3>

	<p class="mt-3 mb-0 opacity-75" *ngIf="description" [innerHtml]="description"></p>

</div>
